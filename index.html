<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d0f14">
<title>Clip Queue Player</title>
<style>
/* ─────────────────────────────────────────────
   DESIGN TOKENS
   Palette: near-black background, deep navy panels,
   electric cyan accent, amber warning, crisp white type.
   Signature element: the "tape reel" progress track
   that fills with a gradient as clips advance.
───────────────────────────────────────────── */
:root {
  --bg:        #0d0f14;
  --surface:   #161a24;
  --panel:     #1e2436;
  --border:    #2a3050;
  --accent:    #00d4ff;
  --accent2:   #0090c0;
  --amber:     #f0a020;
  --danger:    #e03050;
  --success:   #20d080;
  --txt:       #e8eaf0;
  --txt-dim:   #7a84a0;
  --radius:    12px;
  --radius-sm: 8px;
  --font-ui:   system-ui, 'Segoe UI', sans-serif;
  --shadow:    0 10px 30px rgba(0,0,0,0.5);
  --header-h:  56px;
  --footer-h:  76px;
}

/* ── Reset & Base ────────────────────────────────────────────────────────── */
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background-color: var(--bg);
  color: var(--txt);
  font-family: var(--font-ui);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

button {
  background: none;
  border: none;
  color: inherit;
  font: inherit;
  cursor: pointer;
  outline: none;
}

/* ── Structure Layout ────────────────────────────────────────────────────── */
.app-header {
  height: var(--header-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  z-index: 10;
}
.app-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 700;
  font-size: 1.15rem;
  letter-spacing: -0.02em;
  color: #fff;
}
.brand-logo {
  color: var(--accent);
  display: flex;
  align-items: center;
}

.main-layout {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 380px;
  height: calc(100vh - var(--header-h) - var(--footer-h));
  overflow: hidden;
}

@media (max-width: 900px) {
  .main-layout {
    grid-template-columns: 1fr;
    grid-template-rows: auto 1fr;
  }
  .sidebar-panel {
    border-left: none !important;
    border-top: 1px solid var(--border);
  }
}

/* ── Player Section ──────────────────────────────────────────────────────── */
.player-pane {
  background: #000;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  position: relative;
}
.video-viewport {
  width: 100%;
  height: 100%;
  position: relative;
  background: #000;
}
#yt-player {
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  border: none;
}

/* Fallback/Idle Player Screen Overlay */
.player-screen-overlay {
  position: absolute;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  z-index: 2;
  text-align: center;
  padding: 24px;
  transition: opacity 0.3s ease, pointer-events 0.3s ease;
}
.player-screen-overlay.hidden {
  opacity: 0;
  pointer-events: none;
}
.overlay-icon {
  color: var(--txt-dim);
  opacity: 0.5;
}
.overlay-text h3 {
  font-size: 1.25rem;
  margin-bottom: 6px;
  color: #fff;
}
.overlay-text p {
  color: var(--txt-dim);
  font-size: 0.9rem;
}

/* ── Queue Panel ─────────────────────────────────────────────────────────── */
.sidebar-panel {
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.panel-header {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(255,255,255,0.02);
}
.panel-title {
  font-size: 0.95rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--txt-dim);
  display: flex;
  align-items: center;
  gap: 8px;
}
.queue-badge {
  background: var(--border);
  color: var(--txt);
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 0.75rem;
  font-weight: 700;
}

.queue-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* ── Queue Items (Fixed: Clean thumbnails without persistent pause badges) ── */
.queue-item {
  display: grid;
  grid-template-columns: 100px 1fr auto;
  gap: 12px;
  padding: 8px;
  background: var(--panel);
  border: 1px solid transparent;
  border-radius: var(--radius-sm);
  align-items: center;
  cursor: pointer;
  position: relative;
  transition: background 0.2s, border 0.2s;
  user-select: none;
}
.queue-item:hover {
  background: #252c42;
  border-color: #343c5e;
}
.queue-item.active {
  background: rgba(0, 212, 255, 0.06);
  border-color: rgba(0, 212, 255, 0.3);
}

.thumb-wrapper {
  position: relative;
  width: 100px;
  aspect-ratio: 16/9;
  border-radius: 4px;
  overflow: hidden;
  background: #000;
}
.thumb-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.duration-tag {
  position: absolute;
  bottom: 4px;
  right: 4px;
  background: rgba(0,0,0,0.75);
  color: #fff;
  font-size: 0.7rem;
  padding: 1px 4px;
  border-radius: 2px;
  font-weight: 600;
}

/* Order Number and details layout */
.item-meta {
  display: flex;
  flex-direction: column;
  gap: 4px;
  min-width: 0;
}
.item-title {
  font-size: 0.88rem;
  font-weight: 500;
  color: var(--txt);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.item-subtext {
  font-size: 0.78rem;
  color: var(--txt-dim);
  display: flex;
  align-items: center;
  gap: 8px;
}
.item-idx {
  font-weight: 700;
  color: var(--accent);
}

/* Action controls per item row */
.item-actions {
  display: flex;
  align-items: center;
  gap: 4px;
}
.action-btn {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  color: var(--txt-dim);
  transition: background 0.2s, color 0.2s;
}
.action-btn:hover {
  background: var(--border);
  color: #fff;
}
.action-btn.del-btn:hover {
  background: rgba(224, 48, 80, 0.15);
  color: var(--danger);
}

/* Dragging visual indicators */
.queue-item.sortable-ghost {
  opacity: 0.3;
  border: 1px dashed var(--accent);
}

/* Empty Queue Placeholder state */
.queue-empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 48px 24px;
  color: var(--txt-dim);
  text-align: center;
}
.queue-empty-state svg {
  opacity: 0.3;
}

/* ── Unified Media Control Footer ─────────────────────────────────────────── */
.app-footer {
  height: var(--footer-h);
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  z-index: 10;
}

/* Signature Tape-Reel Segmented Track Overlay */
.progress-container {
  height: 6px;
  width: 100%;
  background: var(--border);
  position: relative;
  cursor: pointer;
}
.progress-bar-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--accent2), var(--accent));
  position: absolute;
  top: 0; left: 0;
  transition: width 0.1s linear;
}

.footer-controls-row {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
}

.current-metadata {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 30%;
  min-width: 0;
}
.track-info {
  min-width: 0;
}
.track-title {
  font-size: 0.9rem;
  font-weight: 600;
  color: #fff;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 2px;
}
.track-time-label {
  font-size: 0.8rem;
  color: var(--txt-dim);
}

.center-media-cluster {
  display: flex;
  align-items: center;
  gap: 16px;
}
.media-trigger {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--txt);
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  transition: background 0.2s, color 0.2s;
}
.media-trigger:hover {
  background: var(--border);
  color: #fff;
}
.media-trigger.primary-play {
  width: 46px;
  height: 46px;
  background: var(--accent);
  color: var(--bg);
  border: none;
}
.media-trigger.primary-play:hover {
  background: #40e3ff;
  transform: scale(1.04);
}

.right-utility-cluster {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 16px;
  width: 30%;
}
.volume-slider-pack {
  display: flex;
  align-items: center;
  gap: 8px;
}
.vol-range {
  -webkit-appearance: none;
  appearance: none;
  width: 80px;
  height: 4px;
  border-radius: 2px;
  background: var(--border);
  outline: none;
}
.vol-range::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
}

/* Modals & Action Menus */
.header-actions {
  display: flex;
  align-items: center;
  gap: 10px;
}
.icon-btn-text {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(0, 212, 255, 0.1);
  color: var(--accent);
  padding: 6px 12px;
  border-radius: var(--radius-sm);
  font-size: 0.85rem;
  font-weight: 600;
  border: 1px solid rgba(0, 212, 255, 0.2);
  transition: all 0.2s;
}
.icon-btn-text:hover {
  background: var(--accent);
  color: var(--bg);
}

/* Config Modal Layout */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(5,7,10,0.85);
  backdrop-filter: blur(4px);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease;
}
.modal-overlay.open {
  opacity: 1;
  pointer-events: auto;
}
.modal-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  width: 500px;
  max-width: 90vw;
  box-shadow: var(--shadow);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transform: translateY(20px);
  transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
}
.modal-overlay.open .modal-box {
  transform: translateY(0);
}
.modal-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.modal-body {
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.form-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.form-group label {
  font-size: 0.85rem;
  color: var(--txt-dim);
  font-weight: 500;
}
.form-control-input {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  color: #fff;
  font-family: inherit;
  font-size: 0.9rem;
  outline: none;
}
.form-control-input:focus {
  border-color: var(--accent);
}
.modal-footer {
  padding: 14px 20px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  background: rgba(0,0,0,0.1);
}
.btn {
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  font-size: 0.88rem;
  font-weight: 600;
}
.btn-secondary {
  background: var(--border);
  color: var(--txt);
}
.btn-primary {
  background: var(--accent);
  color: var(--bg);
}

/* Utilities */
.text-sec { color: var(--txt-dim); }
</style>

<script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

</head>
<body>

  <header class="app-header">
    <div class="app-brand">
      <div class="brand-logo"><i data-feather="layers"></i></div>
      <span>ClipGlitch Queue</span>
    </div>
    <div class="header-actions">
      <button class="icon-btn-text" id="open-config-btn">
        <i data-feather="plus-circle" style="width:16px;height:16px;"></i>
        <span>Add Clips</span>
      </button>
      <button class="action-btn" id="open-settings-btn" title="Settings">
        <i data-feather="sliders" style="width:18px;height:18px;"></i>
      </button>
    </div>
  </header>

  <main class="main-layout">
    
    <section class="player-pane">
      <div class="player-screen-overlay" id="player-idle-overlay">
        <div class="overlay-icon"><i data-feather="play-circle" style="width:48px;height:48px;"></i></div>
        <div class="overlay-text">
          <h3>No Clip Loaded</h3>
          <p>Select an item from the queue pool or click add clips to populate sequence timelines.</p>
        </div>
      </div>
      <div class="video-viewport">
        <div id="yt-player"></div>
      </div>
    </section>

    <aside class="sidebar-panel">
      <div class="panel-header">
        <div class="panel-title">
          <i data-feather="list" style="width:16px;height:16px;color:var(--accent)"></i>
          <span>Play Sequence</span>
          <span class="queue-badge" id="queue-counter-badge">0</span>
        </div>
        <button class="action-btn del-btn" id="clear-queue-btn" title="Purge Sequence Queue">
          <i data-feather="trash-2" style="width:16px;height:16px;"></i>
        </button>
      </div>

      <div class="queue-scroll" id="live-sortable-queue">
        </div>
    </aside>

  </main>

  <footer class="app-footer">
    
    <div class="progress-container" id="timeline-scrub-track">
      <div class="progress-bar-fill" id="timeline-fill-core"></div>
    </div>

    <div class="footer-controls-row">
      
      <div class="current-metadata">
        <div class="track-info">
          <div class="track-title" id="global-footer-title">Idle Interface Console</div>
          <div class="track-time-label" id="global-footer-time">00:00 / 00:00</div>
        </div>
      </div>

      <div class="center-media-cluster">
        <button class="media-trigger" id="prev-clip-trigger" title="Previous Sequence Entry">
          <i data-feather="skip-back" style="width:18px;height:18px;"></i>
        </button>
        <button class="media-trigger primary-play" id="global-toggle-play" title="Toggle Play / Pause Execution State">
          <i data-feather="play" id="global-play-icon" style="width:22px;height:22px;fill:currentColor"></i>
        </button>
        <button class="media-trigger" id="next-clip-trigger" title="Skip Next Sequence Entry">
          <i data-feather="skip-forward" style="width:18px;height:18px;"></i>
        </button>
      </div>

      <div class="right-utility-cluster">
        <button class="action-btn" id="loop-toggle-trigger" title="Loop Queue Sequence">
          <i data-feather="repeat" style="width:16px;height:16px;"></i>
        </button>
        <div class="volume-slider-pack">
          <i data-feather="volume-2" style="width:16px;height:16px;color:var(--txt-dim)"></i>
          <input type="range" class="vol-range" id="master-volume-fader" min="0" max="100" value="80">
        </div>
      </div>

    </div>
  </footer>

  <div class="modal-overlay" id="config-modal-backdrop">
    <div class="modal-box">
      <div class="modal-header">
        <h3 style="font-size:1.1rem;font-weight:600">Import Target Clips</h3>
        <button class="action-btn" id="close-config-btn"><i data-feather="x"></i></button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="bulk-import-area">Paste Youtube Content Definition JSON String Arrays</label>
          <textarea class="form-control-input" id="bulk-import-area" rows="8" style="resize:none;font-family:monospace;font-size:0.8rem;" placeholder='[\n  {\n    "videoId": "dQw4w9WgXcQ",\n    "start": 10,\n    "end": 30,\n    "title": "Optional Preset Label"\n  }\n]'></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="cancel-config-btn">Dismiss</button>
        <button class="btn btn-primary" id="submit-import-btn">Compile Ingestion</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="settings-modal-backdrop">
    <div class="modal-box">
      <div class="modal-header">
        <h3 style="font-size:1.1rem;font-weight:600">Sequence Player Rules</h3>
        <button class="action-btn" id="close-settings-btn"><i data-feather="x"></i></button>
      </div>
      <div class="modal-body">
        <div class="form-group" style="flex-direction:row; justify-content:space-between; align-items:center;">
          <div>
            <label style="font-size:0.9rem; color:#fff; display:block; margin-bottom:2px;">Autoplay Next Clip</label>
            <span style="font-size:0.78rem; color:var(--txt-dim);">Automatically advance sequence chains once limits expire.</span>
          </div>
          <input type="checkbox" id="setting-autoplay-next" checked style="width:18px; height:18px; accent-color:var(--accent);">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" id="save-settings-btn">Apply Settings</button>
      </div>
    </div>
  </div>


  <script>
  
  // ─── LOCAL STORAGE MANAGEMENT PERSISTENCE CORE ──────────────────────────────
  const QueueStore = (function() {
    let internalClips = [];
    let subscribers = [];

    function generateId() { return 'clip_' + Math.random().toString(36).substr(2, 9); }
    function syncLocalStorage() { localStorage.setItem('lawglitch_sequence_clips', JSON.stringify(internalClips)); }

    return {
      init() {
        try {
          const stored = localStorage.getItem('lawglitch_sequence_clips');
          internalClips = stored ? JSON.parse(stored) : [];
        } catch(e) { internalClips = []; }
      },
      subscribe(callback) {
        subscribers.push(callback);
        callback([...internalClips]);
      },
      notify() { subscribers.forEach(cb => cb([...internalClips])); },
      getClips() { return [...internalClips]; },
      setClips(newClips) {
        internalClips = newClips.map(c => ({...c, id: c.id || generateId()}));
        syncLocalStorage();
        this.notify();
      },
      addClipsBulk(rawClipsArray) {
        const structuralMap = rawClipsArray.map(c => ({
          id: generateId(),
          videoId: c.videoId || '',
          start: parseInt(c.start) || 0,
          end: parseInt(c.end) || 0,
          title: c.title || `Fetching Video Data...`
        })).filter(c => c.videoId.length > 0);

        internalClips = [...internalClips, ...structuralMap];
        syncLocalStorage();
        this.notify();
      },
      update(id, updatedFields) {
        internalClips = internalClips.map(c => c.id === id ? { ...c, ...updatedFields } : c);
        syncLocalStorage();
        this.notify();
      },
      remove(id) {
        internalClips = internalClips.filter(c => c.id !== id);
        syncLocalStorage();
        this.notify();
      },
      clear() {
        internalClips = [];
        syncLocalStorage();
        this.notify();
      }
    };
  })();

  const SettingsStore = {
    options: { autoplayNext: true, loopQueue: false },
    init() {
      const stored = localStorage.getItem('lawglitch_sequence_settings');
      if (stored) { try { this.options = JSON.parse(stored); } catch(e){} }
    },
    save(newOpts) {
      this.options = { ...this.options, ...newOpts };
      localStorage.setItem('lawglitch_sequence_settings', JSON.stringify(this.options));
    }
  };


  // ─── YOUTUBE PLAYER WRAPPER INTERFACE ──────────────────────────────────────
  const PlayerEngine = (function() {
    let player = null;
    let activeClipInstance = null;
    let activeIndex = -1;
    let monitorInterval = null;
    let eventListeners = {};

    function triggerEvent(evName, data) {
      if (eventListeners[evName]) eventListeners[evName].forEach(cb => cb(data));
    }

    function monitorTimeExecution() {
      if (!player || typeof player.getCurrentTime !== 'function') return;
      const currTime = player.getCurrentTime();
      
      triggerEvent('TimeUpdate', {
        currentTime: currTime,
        start: activeClipInstance ? activeClipInstance.start : 0,
        end: activeClipInstance ? activeClipInstance.end : player.getDuration()
      });

      if (activeClipInstance && activeClipInstance.end && currTime >= activeClipInstance.end) {
        triggerEvent('ClipChange', { state: 'ended', index: activeIndex, clip: activeClipInstance });
      }
    }

    return {
      on(evName, callback) {
        if (!eventListeners[evName]) eventListeners[evName] = [];
        eventListeners[evName].push(callback);
      },
      initPlayer(elementId) {
        player = new YT.Player(elementId, {
          height: '100%',
          width: '100%',
          playerVars: {
            controls: 0,
            disablekb: 1,
            fs: 0,
            rel: 0,
            modestbranding: 1,
            iv_load_policy: 3
          },
          events: {
            onStateChange: (event) => {
              let stateString = 'unknown';
              if (event.data === YT.PlayerState.PLAYING) {
                stateString = 'playing';
                if (!monitorInterval) monitorInterval = setInterval(monitorTimeExecution, 250);
              } else {
                if (event.data === YT.PlayerState.PAUSED) stateString = 'paused';
                else if (event.data === YT.PlayerState.BUFFERING) stateString = 'buffering';
                else if (event.data === YT.PlayerState.ENDED) stateString = 'ended';
                
                if (monitorInterval && stateString !== 'buffering') {
                  clearInterval(monitorInterval);
                  monitorInterval = null;
                }
              }
              triggerEvent('StateChange', { state: stateString, currentIdx: activeIndex, clips: QueueStore.getClips() });
            },
            onReady: () => {
              const savedVol = document.getElementById('master-volume-fader').value;
              player.setVolume(parseInt(savedVol));
            }
          }
        });
      },
      loadClipIndex(idx) {
        const clips = QueueStore.getClips();
        if (idx < 0 || idx >= clips.length) return;

        activeIndex = idx;
        activeClipInstance = clips[idx];

        if (player && typeof player.loadVideoById === 'function') {
          player.loadVideoById({
            videoId: activeClipInstance.videoId,
            startSeconds: activeClipInstance.start || 0
          });
          triggerEvent('StateChange', { state: 'loading', currentIdx: activeIndex, clips });
        }
      },
      play() { if(player && player.playVideo) player.playVideo(); },
      pause() { if(player && player.pauseVideo) player.pauseVideo(); },
      setVolume(val) { if(player && player.setVolume) player.setVolume(val); },
      seekTo(seconds) { if(player && player.seekTo) player.seekTo(seconds, true); },
      getActiveIndex() { return activeIndex; },
      resetIndex() { activeIndex = -1; activeClipInstance = null; }
    };
  })();


  // ─── UI CONTROLLER AND VIEW RENDERER ────────────────────────────────────────
  const UI = (function() {
    const DOM = {
      queueContainer:     document.getElementById('live-sortable-queue'),
      badgeCounter:       document.getElementById('queue-counter-badge'),
      clearQueueBtn:      document.getElementById('clear-queue-btn'),
      idleOverlay:        document.getElementById('player-idle-overlay'),
      globalPlayBtn:      document.getElementById('global-toggle-play'),
      globalPlayIcon:     document.getElementById('global-play-icon'),
      prevClipBtn:        document.getElementById('prev-clip-trigger'),
      nextClipBtn:        document.getElementById('next-clip-trigger'),
      loopToggleBtn:      document.getElementById('loop-toggle-trigger'),
      volumeFader:        document.getElementById('master-volume-fader'),
      footerTitle:        document.getElementById('global-footer-title'),
      footerTime:         document.getElementById('global-footer-time'),
      timelineTrack:      document.getElementById('timeline-scrub-track'),
      timelineFill:       document.getElementById('timeline-fill-core'),
      
      configModal:        document.getElementById('config-modal-backdrop'),
      openConfigBtn:      document.getElementById('open-config-btn'),
      closeConfigBtn:     document.getElementById('close-config-btn'),
      cancelConfigBtn:    document.getElementById('cancel-config-btn'),
      submitImportBtn:    document.getElementById('submit-import-btn'),
      bulkImportArea:     document.getElementById('bulk-import-area'),

      settingsModal:      document.getElementById('settings-modal-backdrop'),
      openSettingsBtn:    document.getElementById('open-settings-btn'),
      closeSettingsBtn:   document.getElementById('close-settings-btn'),
      saveSettingsBtn:    document.getElementById('save-settings-btn'),
      settingAutoplay:    document.getElementById('setting-autoplay-next')
    };

    let sortableInstance = null;

    function formatTime(sec) {
      if (isNaN(sec) || sec < 0) return '00:00';
      const m = Math.floor(sec / 60);
      const s = Math.floor(sec % 60);
      return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    /* Renders the live sequence items without adding layout-breaking elements.
       All active states are managed through clean item-row borders and highlights.
    */
    function renderQueue(clips) {
      DOM.badgeCounter.textContent = clips.length;
      DOM.queueContainer.innerHTML = '';

      if (clips.length === 0) {
        DOM.queueContainer.innerHTML = `
          <div class="queue-empty-state">
            <i data-feather="box" style="width:32px;height:32px;"></i>
            <p>Sequence queue configuration stack empty.</p>
          </div>
        `;
        feather.replace();
        return;
      }

      const activeIdx = PlayerEngine.getActiveIndex();

      clips.forEach((clip, index) => {
        const durationSec = (clip.end && clip.start) ? (clip.end - clip.start) : 0;
        const durationString = durationSec > 0 ? formatTime(durationSec) : '--:--';
        
        const itemRow = document.createElement('div');
        itemRow.className = `queue-item ${index === activeIdx ? 'active' : ''}`;
        itemRow.setAttribute('data-id', clip.id);
        itemRow.setAttribute('data-index', index);

        itemRow.innerHTML = `
          <div class="thumb-wrapper">
            <img class="thumb-img" src="https://img.youtube.com/vi/${clip.videoId}/mqdefault.jpg" alt="Thumb">
            <span class="duration-tag">${durationString}</span>
          </div>
          <div class="item-meta">
            <div class="item-title">${clip.title}</div>
            <div class="item-subtext">
              <span class="item-idx">#${(index + 1).toString().padStart(2, '0')}</span>
              <span>Range: ${clip.start}s - ${clip.end}s</span>
            </div>
          </div>
          <div class="item-actions">
            <button class="action-btn del-btn row-delete-trigger" title="Delete Entry"><i data-feather="x" style="width:14px;height:14px;"></i></button>
          </div>
        `;

        // Selection Trigger Action
        itemRow.addEventListener('click', (e) => {
          if (e.target.closest('.row-delete-trigger')) {
            e.stopPropagation();
            QueueStore.remove(clip.id);
            if (index === PlayerEngine.getActiveIndex()) {
              PlayerEngine.resetIndex();
              DOM.idleOverlay.classList.remove('hidden');
            }
            return;
          }
          PlayerEngine.loadClipIndex(index);
        });

        DOM.queueContainer.appendChild(itemRow);
      });

      feather.replace();
    }

    function handleStateChange(engineState) {
      const { state, currentIdx, clips } = engineState;
      
      if (currentIdx !== -1 && clips[currentIdx]) {
        DOM.idleOverlay.classList.add('hidden');
        DOM.footerTitle.textContent = clips[currentIdx].title;
      } else {
        DOM.idleOverlay.classList.remove('hidden');
        DOM.footerTitle.textContent = "Idle Interface Console";
        DOM.footerTime.textContent = "00:00 / 00:00";
        DOM.timelineFill.style.width = '0%';
      }

      // Track playing toggle status displays
      if (state === 'playing') {
        DOM.globalPlayIcon.setAttribute('data-feather', 'pause');
      } else {
        DOM.globalPlayIcon.setAttribute('data-feather', 'play');
      }
      feather.replace();

      // Refresh highlight elements inside lists
      const rows = DOM.queueContainer.querySelectorAll('.queue-item');
      rows.forEach((row, idx) => {
        if (idx === currentIdx) row.classList.add('active');
        else row.classList.remove('active');
      });
    }

    function handleClipChange(changeData) {
      if (changeData.state === 'ended') {
        const nextIdx = changeData.index + 1;
        const clips = QueueStore.getClips();

        if (nextIdx < clips.length && SettingsStore.options.autoplayNext) {
          PlayerEngine.loadClipIndex(nextIdx);
        } else if (SettingsStore.options.loopQueue && clips.length > 0) {
          PlayerEngine.loadClipIndex(0);
        } else {
          PlayerEngine.resetIndex();
          handleStateChange({ state: 'idle', currentIdx: -1, clips });
        }
      }
    }

    function handleTimeUpdate(metrics) {
      const durationRange = metrics.end - metrics.start;
      const elapsedRelative = metrics.currentTime - metrics.start;
      
      let percentage = (elapsedRelative / durationRange) * 100;
      if (percentage < 0) percentage = 0;
      if (percentage > 100) percentage = 100;

      DOM.timelineFill.style.width = `${percentage}%`;
      DOM.footerTime.textContent = `${formatTime(elapsedRelative)} / ${formatTime(durationRange)}`;
    }

    function handleError() {
      DOM.footerTitle.textContent = "Playback Performance Error Exception";
    }

    async function fetchVideoTitle(videoId) {
      try {
        const res = await fetch(`https://noembed.com/embed?url=https://www.youtube.com/watch?v=${videoId}`);
        const data = await res.json();
        return data.title || null;
      } catch (e) { return null; }
    }

    async function hydrateQueueTitles() {
      const clips = QueueStore.getClips();
      for (let clip of clips) {
        if (clip.title.startsWith("Fetching Video Data...")) {
          const title = await fetchVideoTitle(clip.videoId);
          if (title) QueueStore.update(clip.id, { title });
        }
      }
    }

    // ── Public init ──────────────────────────────────────────────────────────────
    return {
      init() {
        QueueStore.subscribe(clips => renderQueue(clips));
        PlayerEngine.on('StateChange', handleStateChange);
        PlayerEngine.on('ClipChange',  handleClipChange);
        PlayerEngine.on('TimeUpdate',  handleTimeUpdate);
        PlayerEngine.on('Error',       handleError);

        handleStateChange({ state: 'idle', currentIdx: -1, clips: [] });
        hydrateQueueTitles();

        // Register Sorting drag-drop engines
        sortableInstance = new Sortable(DOM.queueContainer, {
          animation: 150,
          ghostClass: 'sortable-ghost',
          handle: '.queue-item',
          onEnd: () => {
            const reorderedClips = [];
            const rows = DOM.queueContainer.querySelectorAll('.queue-item');
            const currentClips = QueueStore.getClips();
            
            rows.forEach(row => {
              const matchId = row.getAttribute('data-id');
              const found = currentClips.find(c => c.id === matchId);
              if (found) reorderedClips.push(found);
            });
            
            QueueStore.setClips(reorderedClips);
          }
        });

        // Click handler implementations
        DOM.clearQueueBtn.addEventListener('click', () => {
          if (confirm("Purge sequence workspace pipelines completely?")) {
            QueueStore.clear();
            PlayerEngine.resetIndex();
            handleStateChange({ state: 'idle', currentIdx: -1, clips: [] });
          }
        });

        DOM.globalPlayBtn.addEventListener('click', () => {
          const currentIdx = PlayerEngine.getActiveIndex();
          if (currentIdx === -1 && QueueStore.getClips().length > 0) {
            PlayerEngine.loadClipIndex(0);
          } else {
            const rows = DOM.queueContainer.querySelectorAll('.queue-item');
            const targetActiveRow = DOM.queueContainer.querySelector('.queue-item.active');
            if (targetActiveRow) {
              const isPlaying = DOM.globalPlayIcon.getAttribute('data-feather') === 'pause';
              if (isPlaying) PlayerEngine.pause();
              else PlayerEngine.play();
            }
          }
        });

        DOM.prevClipBtn.addEventListener('click', () => {
          const prev = PlayerEngine.getActiveIndex() - 1;
          if (prev >= 0) PlayerEngine.loadClipIndex(prev);
        });

        DOM.nextClipBtn.addEventListener('click', () => {
          const next = PlayerEngine.getActiveIndex() + 1;
          if (next < QueueStore.getClips().length) PlayerEngine.loadClipIndex(next);
        });

        DOM.volumeFader.addEventListener('input', (e) => {
          PlayerEngine.setVolume(parseInt(e.target.value));
        });

        DOM.loopToggleBtn.addEventListener('click', () => {
          SettingsStore.options.loopQueue = !SettingsStore.options.loopQueue;
          DOM.loopToggleBtn.style.color = SettingsStore.options.loopQueue ? 'var(--accent)' : 'var(--txt-dim)';
        });

        DOM.timelineTrack.addEventListener('click', (e) => {
          const activeIdx = PlayerEngine.getActiveIndex();
          if (activeIdx === -1) return;
          const currentClips = QueueStore.getClips();
          const targetClip = currentClips[activeIdx];
          
          const rect = DOM.timelineTrack.getBoundingClientRect();
          const pct = (e.clientX - rect.left) / rect.width;
          const totalClipDuration = targetClip.end - targetClip.start;
          
          const targetSeconds = targetClip.start + (totalClipDuration * pct);
          PlayerEngine.seekTo(targetSeconds);
        });

        // Modal triggers binding configurations
        DOM.openConfigBtn.addEventListener('click', () => DOM.configModal.classList.add('open'));
        DOM.closeConfigBtn.addEventListener('click', () => DOM.configModal.classList.remove('open'));
        DOM.cancelConfigBtn.addEventListener('click', () => DOM.configModal.classList.remove('open'));
        
        DOM.submitImportBtn.addEventListener('click', async () => {
          try {
            const parsing = JSON.parse(DOM.bulkImportArea.value);
            if (Array.isArray(parsing)) {
              QueueStore.addClipsBulk(parsing);
              DOM.configModal.classList.remove('open');
              DOM.bulkImportArea.value = '';
              await hydrateQueueTitles();
            } else { alert("Data must compile into structural array sequences."); }
          } catch(e) { alert("Parsing processing errors invalid syntax."); }
        });

        DOM.openSettingsBtn.addEventListener('click', () => {
          DOM.settingAutoplay.checked = SettingsStore.options.autoplayNext;
          DOM.settingsModal.classList.add('open');
        });
        DOM.closeSettingsBtn.addEventListener('click', () => DOM.settingsModal.classList.remove('open'));
        DOM.saveSettingsBtn.addEventListener('click', () => {
          SettingsStore.save({ autoplayNext: DOM.settingAutoplay.checked });
          DOM.settingsModal.classList.remove('open');
        });
      }
    };
  })();


  // ─── YOUTUBE IFRAME API BOOTSTRAP ────────────────────────────────────────────
  window.onYouTubeIframeAPIReady = function() {
    PlayerEngine.initPlayer('yt-player');
  };

  // ─── APP INIT ────────────────────────────────────────────────────────────────
  (function init() {
    QueueStore.init();
    SettingsStore.init();
    UI.init();

    const tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    const firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
  })();

  </script>
</body>
</html>
